<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather_Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">
    <style>

        *{box-sizing:border-box;}
        body{
            color:white;
            font-family:'Poppins', sans-serif;
            margin:0;
            padding:0;
        }
        #container{
            background: linear-gradient(135deg, purple, royalblue);
            backdrop-filter: blur(50px);
            width:100vw;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:30px;
            text-shadow:0 2px 8px rgba(0,0,0,0.25);
            
        }
        h1{
            margin:10px 0 25px;
            font-size:2.5rem;
        }
        #upperContainer{
            display:flex;
            gap:10px;
            width:min(500px,90vw);
            justify-content:center;
        }
        #inputField{
            flex:1;
            border:none;
            border-radius:50px;
            text-align:center;
            color:dimgray;
            font-size:20px;
            padding: 0;
        }
        #btn{
            border:none;
            border-radius:50%;
            height:48px;
            width:48px;
            background-color:white;
            padding: 0;
            cursor:pointer;
        }
        #btn:hover{
            background-color:rgb(160,160,160);
        }
        #lowerContainer{
            display:flex;
            flex-direction:column;
            align-items:center;
            width:100%;
            max-width:900px;
            margin-top:35px;
        }
        #me{
            margin-bottom:25px;
        }
        #if{
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        #temperature{
            font-size:6rem;
            font-weight:700;
            line-height:1;
            margin:0;
        }
        #feelslike{
            margin:2px 0;
            opacity:.9;
            font-size:1.5rem;
        }
        #description{
            font-size:1.5rem;
            margin:8px 0;
        }
        #city{
            font-size:2.5rem;
            font-weight:600;
            margin:0 0 20px;
        }
        #humidity,#pressure,#visibility{
            font-size:1.15rem;
            margin:6px 0;
        }
        #icon{
            font-size: 25px;
        }
        #loading{
            font-size: 20px;
        }

    </style>
</head>
<body>
    <div id="container">
        <h1>Weather Dashboard</h1>
        <div id="upperContainer">
            <input id="inputField" type="text" placeholder="Enter city name">
            <button id="btn"><i style="font-size: 25px;" class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div id="lowerContainer">
            <p id="temperature"></p>
            <p id="city"></p>
            <div id="if">
                <i id="icon"></i>
                <p id="feelslike"></p>
            </div>
            <p id="description"></p>
            <p id="humidity"></p>
            <p id="pressure"></p>
            <p id="visibility"></p>
        </div>
        <footer>
            <p id="me">made by castro@2026</p>
        </footer>
    </div>
    <script>
        const search = document.getElementById("btn");
        const me = document.getElementById("me");
        search.addEventListener("click",fetchData)
        async function fetchData() {
            me.remove();
            const cityInput = document.getElementById("inputField").value.toLowerCase();
            const apiKey = "4b68e2bb2c8d888f65435e660d998544";
            const icon = document.getElementById("icon")
            if(!cityInput == ""){
                try{        
                    const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cityInput}&units=metric&appid=${apiKey}`);
                    const data = await response.json();
                    console.log(data);
                    
                    const cityNameData = data.name;
                    const cityTemperatureData = data.main.temp.toFixed();
                    const feelsLikeData = data.main.feels_like.toFixed();
                    const humidityData = data.main.humidity;
                    const pressureData = data.main.pressure;
                    const VisibilityData = (data.visibility/1000);
                    let descriptionData = data.weather[0].description;
                    descriptionData = descriptionData[0].toUpperCase() + descriptionData.slice(1);
                    const weatherData = data.weather[0].main;
                    
                    const cityTemperatureDisplay = document.getElementById("temperature");
                    const feelsLikeDisplay = document.getElementById("feelslike");
                    const descriptionDisplay = document.getElementById("description");
                    const cityNameDisplay = document.getElementById("city");
                    const humidityDisplay = document.getElementById("humidity");
                    const pressureDisplay = document.getElementById("pressure");
                    const visibilityDisplay = document.getElementById("visibility");
                    const backgroundTemplate = document.getElementById("container");
                    
                    cityTemperatureDisplay.textContent = `${cityTemperatureData}°C`;
                    descriptionDisplay.textContent = descriptionData;
                    feelsLikeDisplay.textContent = `feels like ${feelsLikeData}°C`;
                    cityNameDisplay.textContent = cityNameData;
                    humidityDisplay.textContent = `Humidity: ${humidityData}%`;
                    pressureDisplay.textContent = `Pressure: ${pressureData}hPa`;
                    visibilityDisplay.textContent = `Visibility: ${VisibilityData}Km`;
                    if(weatherData === "Clear"){
                        icon.className = "fa-solid fa-sun";
                        icon.style.color = "#fbbf24";
                        document.body.style.color = "white";
                        backgroundTemplate.style.color = "white";
                        backgroundTemplate.style.background = "linear-gradient(135deg, deepskyblue, skyblue, gold)";
                    }
                    if(weatherData == "Clouds"){
                        icon.className = "fa-solid fa-cloud";
                        icon.style.color = "#94a3b8";
                        document.body.style.color = "white";
                        backgroundTemplate.style.color = "white";
                        backgroundTemplate.style.background = "linear-gradient(135deg, slategray, lightgray, slategray)";
                    }
                    if(weatherData == "Rain"){
                        icon.className = "fa-solid fa-cloud-rain";
                        icon.style.color = "#3b82f6";
                        document.body.style.color = "white";
                        backgroundTemplate.style.color = "white";
                        backgroundTemplate.style.background = "linear-gradient(135deg, midnightblue, steelblue, lightblue)";
                    }
                    if(weatherData == "Thunderstorm"){
                        icon.className = "fa-solid fa-cloud-bolt";
                        icon.style.color = "#f59e0b";
                        document.body.style.color = "white";
                        backgroundTemplate.style.color = "white";
                        backgroundTemplate.style.background = "linear-gradient(135deg, black, darkslategray, slategray)";
                    }
                    if(weatherData == "Snow"){
                        icon.className = "fa-solid fa-snowflake";
                        icon.style.color = "black";
                        document.body.style.color = "black";
                        backgroundTemplate.style.color = "black";
                        backgroundTemplate.style.background = "linear-gradient(135deg, white, aliceblue, lightblue)"
                    }
                    if(weatherData == "Mist" || weatherData == "Fog"){
                        icon.className = "fa-solid fa-smog";
                        icon.style.color = "#9ca3af";
                        document.body.style.color = "black";
                        backgroundTemplate.style.color = "black";
                        backgroundTemplate.style.background = "linear-gradient(135deg, silver, gray, whitesmoke)"
                    }
                    if(weatherData == "Haze"){
                        icon.className = "fa-solid fa-smog";
                        icon.style.color = "#9ca3af";
                        document.body.style.color = "black";
                        backgroundTemplate.style.color = "black";
                        backgroundTemplate.style.background = "linear-gradient(135deg, beige, khaki,lightgray)"
                    }
                }
                catch(error){
                    window.alert(`Please enter a valid city name or Check your connection status.`);
                    console.error(error);
                }
            }
        }
        document.addEventListener("keydown", Enter)
        function Enter(){
            if(event.key == "Enter"){
                fetchData();
            }
        }
    </script>
</body>
</html>
